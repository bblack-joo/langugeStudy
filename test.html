<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>한글 영어 읽기 프로그램</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="wrap">

<h1>한글 영어 읽기 프로그램</h1>

<div class="card">
  <b>0. 내장 문장집 불러오기</b>

  <div class="book-row">
    <span class="book-name">Grammar in Use</span>
    <select id="giuSelect"></select>
    <button onclick="loadSelectedUnit('giuSelect')">불러오기</button>
  </div>

  <div class="book-row">
    <span class="book-name">오픽의 신</span>
    <select id="opicSelect"></select>
    <button onclick="loadSelectedUnit('opicSelect')">불러오기</button>
  </div>

  <div class="hint">
    교재 이름 옆에서 단원을 선택하고 불러오면 아래 입력창에 자동으로 들어가.
  </div>
</div>

<div class="card">
<b>1. 데이터 넣기</b>
<div class="hint">탭 또는 엔터로 구분된 한글/영어 문장을 붙여넣거나, Excel/CSV/TXT 파일을 불러와.</div>

<textarea id="inputText" placeholder="한글<Tab>영어 또는 한글<Enter>영어 형태로 붙여넣기"></textarea>

<div class="row">
<input type="file" id="fileInput" accept=".xlsx,.xls,.csv,.txt" />
<button onclick="parseText()">표 생성</button>
<button class="secondary" onclick="loadSample()">샘플 넣기</button>
<button class="gray" onclick="clearAll()">초기화</button>
</div>
</div>

<div class="card">
<b>2. 읽기 설정 / Python 코드</b>

<div class="row">
<button onclick="readAll('both')">▶ 표 읽기</button>
<button onclick="readAll('ko')">한글</button>
<button onclick="readAll('en')">영어</button>
<button class="orange" onclick="readRandom()">🎲 랜덤 읽기</button>
<button class="secondary" onclick="pauseSpeak()">⏸ 일시정지</button>
<button class="green" onclick="resumeSpeak()">▶ 이어읽기</button>
<button class="red" onclick="stopSpeak()">■ 정지</button>
</div>

<div class="row">
<button class="green" onclick="generatePython('both')">🐍 문장별 생성 코드</button>
<button class="green" onclick="generatePython('ko')">🇰🇷 한글 한 파일 코드</button>
<button class="green" onclick="generatePython('en')">🇺🇸 영어 한 파일 코드</button>
<button class="green" onclick="downloadPython()">💾 .py 저장</button>
<button class="secondary" onclick="copyPython()">📋 코드 복사</button>
</div>

<div class="row">
<label>읽기 순서
<select id="orderMode">
<option value="ko_en">한글 → 영어</option>
<option value="en_ko">영어 → 한글</option>
</select>
</label>

<label>반복 <input id="repeatCount" type="number" min="1" value="1" style="width:60px"> 회</label>
<label>한글/영어 사이 쉬기 <input id="pairGapSec" type="number" min="0" step="0.1" value="5" style="width:70px"> 초</label>
<label>문장 사이 쉬기 <input id="gapSec" type="number" min="0" step="0.1" value="1.0" style="width:70px"> 초</label>
<label><input id="pythonRandom" type="checkbox"> Python 랜덤 순서</label>
<label>한글 속도 <input id="koRate" type="number" min="0.5" max="2" step="0.1" value="1.2" style="width:70px"></label>
<label>영어 속도 <input id="enRate" type="number" min="0.5" max="2" step="0.1" value="1.0" style="width:70px"></label>
<label>파일명 <input id="baseName" value="opic_practice" style="width:150px"></label>
</div>
</div>

<div class="card" id="pythonCard" style="display:none">
<b>생성된 Python 코드</b>
<pre id="pythonCode"></pre>
</div>

<div class="card">
<b>3. 생성된 표</b>
<div class="hint">각 행의 ▶전체 / 한글 / 영어 / 🔁 버튼으로 그 문장만 읽을 수 있어.</div>
<div id="countInfo" class="hint">0개 문장</div>

<table id="dataTable">
<thead>
<tr>
<th class="num">번호</th>
<th class="kr">한글</th>
<th class="en">영어</th>
<th class="actions">기능</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script src="units/giu.js"></script>
<script src="units/opic.js"></script>
<script src="func.js"></script>

</body>
</html>
