<style>
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;margin:0;background:#f6f7fb;color:#222}.wrap{max-width:1200px;margin:0 auto;padding:18px}h1{font-size:24px;margin:8px 0 14px}.card{background:#fff;border:1px solid #ddd;border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.04)}textarea{width:100%;height:150px;box-sizing:border-box;border:1px solid #ccc;border-radius:10px;padding:10px;font-size:15px;line-height:1.45}button{border:0;border-radius:9px;padding:9px 12px;margin:4px;background:#2f6fed;color:white;font-weight:700;cursor:pointer}button.secondary{background:#555}button.green{background:#138a4d}button.orange{background:#e57920}button.red{background:#d93f3f}button.gray{background:#777}button.small{padding:6px 9px;font-size:13px;margin:2px}input,select{padding:7px;border:1px solid #ccc;border-radius:8px;margin:4px}label{display:inline-flex;align-items:center;gap:4px;margin:5px 10px 5px 0;font-size:14px}.row{display:flex;flex-wrap:wrap;align-items:center;gap:6px}.book-row{display:flex;align-items:center;gap:8px;margin:8px 0;flex-wrap:wrap}.book-name{width:90px;font-weight:800;font-size:15px}.book-row select{min-width:260px}.hint{font-size:13px;color:#666;margin-top:6px}table{width:100%;border-collapse:collapse;background:#fff}th,td{border:1px solid #ddd;padding:6px 7px;vertical-align:top;font-size:14px}th{background:#eef3ff}tr.active{background:#fff6c9}tr.done{background:#edf9ef}.num{width:42px;text-align:center;color:#666}.actions{width:230px}.kr{width:35%}.en{width:43%}pre{white-space:pre-wrap;background:#111;color:#e6e6e6;padding:12px;border-radius:10px;max-height:390px;overflow:auto;font-size:13px}.random-count{min-width:110px;background:#fffaf3;border:1px solid #f0b36a}.question-box{background:#f0fdf4;border:1px solid #86efac;border-radius:12px;padding:12px;margin:10px 0;line-height:1.5}.question-group-title{margin-top:10px;color:#166534;font-weight:800}.question-item{margin:8px 0;color:#14532d}.question-no{display:inline-block;background:#dcfce7;border-radius:6px;padding:2px 6px;font-weight:900;margin-right:4px}.q-en{font-weight:800}.q-ko{margin-top:2px}.q-meta{font-size:12px;color:#666;margin-top:2px}.keyword-toggle{background:#0f766e;padding:6px 9px;font-size:12px;margin:6px 0 3px}.keyword-box{display:none;background:#ecfeff;border:1px solid #67e8f9;border-radius:10px;padding:9px;margin-top:5px;color:#164e63;white-space:pre-wrap}.keyword-copy{background:#0891b2;padding:5px 8px;font-size:12px;margin-left:5px}
</style>

<body>
<div class="wrap">

<div class="card">
  <b>0. 엑셀 문장집 불러오기</b>
  <div class="book-row">

    <select id="randomCount" class="random-count"><option value="5">랜덤 5개</option><option value="10" selected>랜덤 10개</option><option value="20">랜덤 20개</option></select>
    <button class="orange" onclick="loadRandomItems()">랜덤 불러오기</button>
  </div>
  <div class="hint">답변 탭은 헤더 아래에서 빈 줄 전까지 한 묶음으로 읽어. 같은 묶음 안의 unit/그룹/질문 번호는 전부 질문 박스에 표시해.</div>

<div class="hint">탭 또는 엔터로 구분된 한글/영어 문장을 붙여넣거나, Excel/CSV/TXT 파일을 불러와.</div>
<textarea id="inputText" placeholder="한글<Tab>영어 또는 한글<Enter>영어 형태로 붙여넣기"></textarea>

<div class="card">
<b>2. 읽기 설정 / Python 코드</b>
<div class="row"><button onclick="readAll('both')">▶ 표 읽기</button><button onclick="readAll('ko')">한글</button><button onclick="readAll('en')">영어</button><button class="orange" onclick="readRandom()">🎲 랜덤 읽기</button><button class="secondary" onclick="pauseSpeak()">⏸ 일시정지</button><button class="green" onclick="resumeSpeak()">▶ 이어읽기</button><button class="red" onclick="stopSpeak()">■ 정지</button></div>
<div class="row"><button class="green" onclick="generatePython('both')">🐍 문장별 생성 코드</button><button class="green" onclick="generatePython('ko')">🇰🇷 한글 한 파일 코드</button><button class="green" onclick="generatePython('en')">🇺🇸 영어 한 파일 코드</button><button class="green" onclick="downloadPython()">💾 .py 저장</button><button class="secondary" onclick="copyPython()">📋 코드 복사</button></div>
<div class="row"><label>읽기 순서<select id="orderMode"><option value="ko_en">한글 → 영어</option><option value="en_ko">영어 → 한글</option></select></label><label>반복 <input id="repeatCount" type="number" min="1" value="1" style="width:60px"> 회</label><label>한글/영어 사이 쉬기 <input id="pairGapSec" type="number" min="0" step="0.1" value="5" style="width:70px"> 초</label><label>문장 사이 쉬기 <input id="gapSec" type="number" min="0" step="0.1" value="1.0" style="width:70px"> 초</label><label><input id="pythonRandom" type="checkbox"> Python 랜덤 순서</label><label>한글 속도 <input id="koRate" type="number" min="0.5" max="2" step="0.1" value="1.2" style="width:70px"></label><label>영어 속도 <input id="enRate" type="number" min="0.5" max="2" step="0.1" value="1.0" style="width:70px"></label><label>파일명 <input id="baseName" value="opic_practice" style="width:150px"></label></div>

<div class="card"><b>3. 생성된 표</b><div class="hint">각 행의 ▶전체 / 한글 / 영어 / 🔁 버튼으로 그 문장만 읽을 수 있어.</div><div id="questionBox" class="question-box" style="display:none"><b>질문</b><div id="questionList"></div></div><div id="countInfo" class="hint">0개 문장</div><table id="dataTable"><thead><tr><th class="num">번호</th><th class="kr">한글 <button class="green small" onclick="displayRow('ko', this)">숨기기</button></th><th class="en">영어 <button class="green small" onclick="displayRow('en', this)">숨기기</button></th><th class="actions">기능</th></tr></thead><tbody></tbody></table></div>
</div>
<script>
let rows=[],speaking=false,loopOne=false,paused=false,currentIndex=0,currentPythonMode='both',playToken=0;
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const BOOK={workbook:null,questions:{},items:[]};
function norm(s){return String(s??'').trim().replace(/\s+/g,'').toLowerCase();}
function val(row,i){return String((row&&row[i]!=null)?row[i]:'').trim();}
function idCell(v){
 const s=String(v??'').trim();
 if(!s)return '';
 if(/^\d+(?:\.0+)?$/.test(s))return String(parseInt(s,10));
 return s;
}
function isBlankRow(row,cols){return cols.every(c=>!val(row,c));}
function keyOf(u,g,q){return `${String(u).trim()}|${String(g).trim()}|${String(q).trim()}`;}
function compactNo(u,g,q){return `${String(u).trim()}${String(g).trim()}${String(q).trim()}`;}
function escapeHtml(s){return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
function escapeAttr(s){return String(s??'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pyStr(s){return JSON.stringify(String(s??''));}
function uniqueRefs(refs){const seen=new Set(),out=[]; refs.forEach(r=>{if(!r.unitNo||!r.groupNo||!r.questionNo)return; const k=keyOf(r.unitNo,r.groupNo,r.questionNo); if(!seen.has(k)){seen.add(k);out.push(r);}}); return out;}
function findHeaderRow(arr, required){
  for(let r=0;r<arr.length;r++){
    const cells=(arr[r]||[]).map(norm); let cols={};
    for(const [key,aliases] of Object.entries(required)){
      const list=Array.isArray(aliases)?aliases:[aliases];
      const idx=cells.findIndex(v=>list.map(norm).includes(v));
      cols[key]=idx;
    }
    if(Object.values(cols).every(i=>i>=0)) return {rowIndex:r,cols};
  }
  return null;
}
function getUnitFromSheetName(name){const m=String(name).match(/^(\d+)/);return m?String(Number(m[1])):'';}
function findSheetUnit(arr){
  for(let r=0;r<arr.length;r++) for(let c=0;c<(arr[r]||[]).length;c++){
    if(norm(arr[r][c])==='unit번호'){
      const right=val(arr[r],c+1); const below=arr[r+1]?val(arr[r+1],c):'';
      return right||below;
    }
  }
  return '';
}
function parseQuestionSheet(ws){
 const arr=XLSX.utils.sheet_to_json(ws,{header:1,blankrows:true,defval:''});
 const header=findHeaderRow(arr,{
   unit:['unit번호','유닛번호'],
   group:['그룹번호','그룹 번호'],
   qno:['질문번호','질문 번호'],
   content:['내용','질문'],
   trans:['해석','번역']
 });
 if(!header)return {};

 // H열 답변 흐름 읽기
 // 1순위: 헤더명 "답변 흐름 / 내 답변 키워드 / 키워드 / 흐름"
 // 2순위: 실제 H열(index 7)
 const headerCells=(arr[header.rowIndex]||[]).map(norm);
 let flowCol=headerCells.findIndex(v=>['답변흐름','내답변키워드','답변키워드','키워드','흐름'].includes(v));
 if(flowCol<0) flowCol=7;

 const res={};
 for(let r=header.rowIndex+1;r<arr.length;r++){
   const line=arr[r]||[];
   const unitNo=idCell(line[header.cols.unit]);
   const groupNo=idCell(line[header.cols.group]);
   const questionNo=idCell(line[header.cols.qno]);
   const content=val(line,header.cols.content);
   const trans=val(line,header.cols.trans);
   const flow=val(line,flowCol);
   if(!unitNo&&!groupNo&&!questionNo&&!content&&!trans&&!flow) continue;
   if(!unitNo||!groupNo||!questionNo) continue;
   const k=keyOf(unitNo,groupNo,questionNo);
   res[k]={unitNo,groupNo,questionNo,content,trans,flow};
 }
 return res;
}
function parseAnswerSheet(ws,sheetName){
 const arr=XLSX.utils.sheet_to_json(ws,{header:1,blankrows:true,defval:''});
 const header=findHeaderRow(arr,{
   unit:['unit번호','유닛번호'],
   group:['그룹번호','그룹 번호'],
   qno:['질문번호','질문 번호'],
   ko:['한글','한국어'],
   en:['영어','english']
 });
 if(!header)return [];

 // 답변 시트의 H열 "답변 흐름" 읽기
 // 헤더명이 있으면 그 열을 쓰고, 못 찾으면 H열(index 7)을 사용한다.
 const headerCells=(arr[header.rowIndex]||[]).map(norm);
 let flowCol=headerCells.findIndex(v=>['답변흐름','내답변키워드','답변키워드','키워드','흐름'].includes(v));
 if(flowCol<0) flowCol=7;

 const blocks=[];
 let answers=[];
 let refs=[];
 let flows=[];
 let blockNo=1;
 let lastUnit='';
 let lastGroup='';
 const cols=[header.cols.unit,header.cols.group,header.cols.qno,header.cols.ko,header.cols.en,flowCol];

 function addRef(u,g,q){
   const unitNo=idCell(u||lastUnit);
   const groupNo=idCell(g||lastGroup);
   const questionNo=idCell(q);
   if(!unitNo||!groupNo||!questionNo) return;
   refs.push({unitNo,groupNo,questionNo});
 }

 function addFlow(text){
   const t=String(text||'').trim();
   if(!t) return;
   if(!flows.includes(t)) flows.push(t);
 }

 function saveBlock(){
   if(answers.length===0){
     refs=[]; flows=[]; lastUnit=''; lastGroup='';
     return;
   }
   blocks.push({
     sheetName,
     blockNo:blockNo++,
     refs:uniqueRefs(refs),
     answers:[...answers],
     flows:[...flows]
   });
   answers=[];
   refs=[];
   flows=[];
   lastUnit='';
   lastGroup='';
 }

 for(let r=header.rowIndex+1;r<arr.length;r++){
   const line=arr[r]||[];
   const isBlank=cols.every(c=>!val(line,c));
   if(isBlank){saveBlock(); continue;}

   const unitNo=idCell(line[header.cols.unit]);
   const groupNo=idCell(line[header.cols.group]);
   const questionNo=idCell(line[header.cols.qno]);
   const ko=val(line,header.cols.ko);
   const en=val(line,header.cols.en);
   const flow=val(line,flowCol);

   if(unitNo) lastUnit=unitNo;
   if(groupNo) lastGroup=groupNo;
   if(questionNo) addRef(unitNo,groupNo,questionNo);
   addFlow(flow);

   if(ko||en){
     answers.push({ko,en});
   }
 }
 saveBlock();
 return blocks;
}
async function loadWorkbookFile(file){
 if(!file)return;
 stopSpeak();
 try{
  const data=await file.arrayBuffer();
  const wb=XLSX.read(data,{type:'array'});
  BOOK.workbook=wb;
  BOOK.questions={};
  BOOK.items=[];

  const qName=wb.SheetNames.find(n=>norm(n)==='0.질문')||wb.SheetNames.find(n=>String(n).includes('질문'));
  if(qName) BOOK.questions=parseQuestionSheet(wb.Sheets[qName]);

  wb.SheetNames.forEach(sheetName=>{
    if(sheetName===qName) return;
    const blocks=parseAnswerSheet(wb.Sheets[sheetName],sheetName);
    blocks.forEach(b=>{
      const questions=b.refs.map(ref=>{
        const found=BOOK.questions[keyOf(ref.unitNo,ref.groupNo,ref.questionNo)];
        return found || {...ref,content:'질문을 찾지 못했어.',trans:''};
      });
      BOOK.items.push({
        key:`${sheetName}__${b.blockNo}`,
        label:`${sheetName}_${b.blockNo}`,
        sheetName,
        blockNo:b.blockNo,
        refs:b.refs,
        questions,
        answers:b.answers,
        flows:b.flows || []
      });
    });
  });

  const select=document.getElementById('unitSelect');
  if(!BOOK.items.length){
    select.innerHTML='<option value="">불러올 문장이 없음</option>';
    alert('엑셀에서 불러올 문장을 찾지 못했어.');
    return;
  }
  select.innerHTML=BOOK.items.map(i=>`<option value="${escapeAttr(i.key)}">${escapeHtml(i.label)}</option>`).join('');
 }catch(e){console.error(e);alert('엑셀 파일을 불러오지 못했어.');}
}
function itemToPairs(item){return item.answers.map(a=>({ko:a.ko,en:a.en}));}
function showQuestions(items){
 const box=document.getElementById('questionBox'), list=document.getElementById('questionList');
 const html=[];
 let keywordNo=0;
 items.forEach(item=>{
  html.push(`<div class="question-group-title">${escapeHtml(item.label)}</div>`);
  if(!item.questions||!item.questions.length){
    html.push('<div class="question-item">연결된 질문 번호가 없어.</div>');
  }else{
    item.questions.forEach(q=>{
      const no=compactNo(q.unitNo,q.groupNo,q.questionNo);
      html.push(`<div class="question-item"><div><span class="question-no">${escapeHtml(no)}.</span><span class="q-en">${escapeHtml(q.content||'질문을 찾지 못했어.')}</span></div>${q.trans?`<div class="q-ko">${escapeHtml(q.trans)}</div>`:''}<div class="q-meta">U${escapeHtml(q.unitNo)} G${escapeHtml(q.groupNo)} Q${escapeHtml(q.questionNo)}</div></div>`);
    });
  }

  // 답변 시트 H열의 "답변 흐름"은 질문 아래에 한 번만 표시한다.
  const flowText=(item.flows||[]).map(x=>String(x).trim()).filter(Boolean).join('\n');
  if(flowText){
    const flowId=`keyword_${keywordNo++}`;
    html.push(`<div class="question-item"><button class="keyword-toggle" onclick="toggleKeyword('${flowId}', this)">키워드 보기</button><button class="keyword-copy" onclick="copyKeyword('${flowId}')">복사</button><div id="${flowId}" class="keyword-box">${escapeHtml(flowText)}</div></div>`);
  }
 });
 list.innerHTML=html.join('');
 box.style.display=html.length?'block':'none';
}
function toggleKeyword(id,btn){
 const box=document.getElementById(id);
 if(!box)return;
 const show=box.style.display!=='block';
 box.style.display=show?'block':'none';
 if(btn)btn.textContent=show?'키워드 숨기기':'키워드 보기';
}
function copyKeyword(id){
 const box=document.getElementById(id);
 if(!box)return;
 navigator.clipboard.writeText(box.textContent||'');
 alert('키워드 복사했어.');
}
function hideQuestions(){document.getElementById('questionBox').style.display='none';document.getElementById('questionList').innerHTML='';}
function setRows(pairs){document.getElementById('inputText').value=pairs.map(i=>`${i.ko}\t${i.en}`).join('\n');parseText();}
function loadSelectedItem(){stopSpeak();const key=document.getElementById('unitSelect').value;const item=BOOK.items.find(v=>v.key===key);if(!item){alert('선택한 묶음을 찾지 못했어.');return;}showQuestions([item]);setRows(itemToPairs(item));}
function loadAllItems(){stopSpeak();if(!BOOK.items.length){alert('먼저 엑셀 파일을 선택해줘.');return;}showQuestions(BOOK.items);setRows(BOOK.items.flatMap(itemToPairs));}
function shuffleArray(a){return a.map(v=>({v,s:Math.random()})).sort((x,y)=>x.s-y.s).map(x=>x.v)}
function loadRandomItems(){stopSpeak();if(!BOOK.items.length){alert('먼저 엑셀 파일을 선택해줘.');return;}const count=Number(document.getElementById('randomCount').value||10);const picked=shuffleArray(BOOK.items).slice(0,Math.min(count,BOOK.items.length));showQuestions(picked);setRows(picked.flatMap(itemToPairs));}
function isHeader(ko,en){return norm(ko)==='한글'&&norm(en)==='영어';}
function loadSample(){document.getElementById('inputText').value=`한글\t영어\n집에 있는 가구에 대해 말해 주세요.\tTell me about the furniture you have in your home.\n가장 좋아하는 가구가 있나요?\tIs there a piece that is your favorite?`;parseText();}
function clearAll(){rows=[];document.getElementById('inputText').value='';renderTable();document.getElementById('pythonCard').style.display='none';hideQuestions();}
function parseText(){const text=document.getElementById('inputText').value.trim();if(!text){alert('데이터를 먼저 넣어줘.');return;}const lines=text.split(/\r?\n/).map(x=>x.trim()).filter(Boolean);rows=[];for(const line of lines){let parts=line.split('\t'); if(parts.length<2)parts=line.split(/ {2,}|,/); if(parts.length>=2){const ko=parts[0].trim(),en=parts.slice(1).join(' ').trim(); if(ko&&en&&!isHeader(ko,en))rows.push({ko,en,done:false});}}
 if(!rows.length){const parts=text.replace(/\r\n/g,'\n').replace(/\t/g,'\n').split(/\n+/).map(x=>x.trim()).filter(Boolean);for(let i=0;i<parts.length;i+=2){const ko=parts[i]||'',en=parts[i+1]||'';if(ko&&en&&!isHeader(ko,en))rows.push({ko,en,done:false});}}
 renderTable();}
function renderTable(){const tb=document.querySelector('#dataTable tbody');tb.innerHTML='';rows.forEach((r,i)=>{const tr=document.createElement('tr');tr.id='row'+i;tr.innerHTML=`<td class="num">${i+1}</td><td>${escapeHtml(r.ko)}</td><td>${escapeHtml(r.en)}</td><td class="actions"><button class="small" onclick="readOne(${i},'both')">▶전체</button><button class="small" onclick="readOne(${i},'ko')">한글</button><button class="small" onclick="readOne(${i},'en')">영어</button><button class="small orange" onclick="repeatOne(${i})">🔁</button></td>`;tb.appendChild(tr);});document.getElementById('countInfo').textContent=`${rows.length}개 문장`;}
function getVoice(lang){const voices=speechSynthesis.getVoices();return voices.find(v=>v.lang.toLowerCase().startsWith(lang))||null;}
function sleepWithToken(ms,token){return new Promise(resolve=>{const start=Date.now();const tick=()=>{if(token!==playToken||!speaking){resolve(false);return;}const remain=ms-(Date.now()-start);if(remain<=0){resolve(true);return;}setTimeout(tick,Math.min(100,remain));};tick();});}
function speakText(text,lang,rate,token){return new Promise(resolve=>{if(!text||token!==playToken||!speaking){resolve(false);return;}const u=new SpeechSynthesisUtterance(text);u.lang=lang==='ko'?'ko-KR':'en-US';u.rate=Number(rate)||1;const v=getVoice(lang);if(v)u.voice=v;let fin=false;const done=ok=>{if(fin)return;fin=true;resolve(ok)};u.onend=()=>done(true);u.onerror=()=>done(false);speechSynthesis.speak(u);const watcher=setInterval(()=>{if(fin){clearInterval(watcher);return;}if(token!==playToken||!speaking){clearInterval(watcher);done(false);}},100);});}
function markActive(i){currentIndex=i;document.querySelectorAll('tr').forEach(x=>x.classList.remove('active'));const tr=document.getElementById('row'+i);if(tr)tr.classList.add('active');}
function clearActive(){document.querySelectorAll('tr').forEach(x=>x.classList.remove('active'));}
function markDone(i){const tr=document.getElementById('row'+i);if(tr)tr.classList.add('done');}
async function speakRow(i,mode,token){if(token!==playToken||!rows[i])return;markActive(i);const r=rows[i],gap=Number(document.getElementById('pairGapSec').value||0)*1000,koRate=document.getElementById('koRate').value,enRate=document.getElementById('enRate').value;await speakText(`${i+1}`,'ko',koRate,token);let ok=await sleepWithToken(500,token);if(!ok)return;if(mode==='ko')await speakText(r.ko,'ko',koRate,token);else if(mode==='en')await speakText(r.en,'en',enRate,token);else if(document.getElementById('orderMode').value==='ko_en'){await speakText(r.ko,'ko',koRate,token);ok=await sleepWithToken(gap,token);if(!ok)return;await speakText(r.en,'en',enRate,token);}else{await speakText(r.en,'en',enRate,token);ok=await sleepWithToken(gap,token);if(!ok)return;await speakText(r.ko,'ko',koRate,token);}if(token===playToken&&speaking)markDone(i);}
async function readOne(i,mode){stopSpeak();await sleep(150);const token=++playToken;speaking=true;paused=false;loopOne=false;await speakRow(i,mode,token);if(token===playToken)speaking=false;}
async function repeatOne(i){stopSpeak();await sleep(150);const token=++playToken;speaking=true;loopOne=true;while(speaking&&loopOne&&token===playToken){await speakRow(i,'both',token);await sleepWithToken(500,token);}}
async function readAll(mode){stopSpeak();await sleep(150);const token=++playToken;speaking=true;loopOne=false;const rep=Number(document.getElementById('repeatCount').value||1),gap=Number(document.getElementById('gapSec').value||0)*1000;for(let k=0;k<rep;k++)for(let i=0;i<rows.length;i++){if(!speaking||token!==playToken)return;await speakRow(i,mode,token);if(!speaking||token!==playToken)return;await sleepWithToken(gap,token);}if(token===playToken)speaking=false;}
async function readRandom(){stopSpeak();await sleep(150);const token=++playToken;speaking=true;const rep=Number(document.getElementById('repeatCount').value||1),gap=Number(document.getElementById('gapSec').value||0)*1000;for(let k=0;k<rep;k++){let arr=shuffleArray([...rows.keys()]);for(const i of arr){if(!speaking||token!==playToken)return;await speakRow(i,'both',token);if(!speaking||token!==playToken)return;await sleepWithToken(gap,token);}}if(token===playToken)speaking=false;}
function pauseSpeak(){if(speechSynthesis.speaking&&!speechSynthesis.paused){paused=true;speechSynthesis.pause();}}
function resumeSpeak(){if(paused||speechSynthesis.paused){paused=false;speechSynthesis.resume();}}
function stopSpeak(){playToken++;speaking=false;loopOne=false;paused=false;currentIndex=0;speechSynthesis.cancel();clearActive();const first=document.getElementById('row0');if(first)first.classList.add('active');}
function displayRow(lang,btn){const colIndex=lang==='ko'?1:2;const hide=btn.dataset.hide!=='1';document.querySelectorAll('#dataTable tr').forEach(tr=>{if(tr.parentElement.tagName==='THEAD')return;const cell=tr.children[colIndex];if(cell)cell.style.display=hide?'none':'';});btn.dataset.hide=hide?'1':'0';btn.textContent=hide?'보이기':'숨기기';}
document.getElementById('fileInput').addEventListener('change',async e=>{const file=e.target.files[0];if(!file)return;const name=file.name.toLowerCase();if(name.endsWith('.txt')||name.endsWith('.csv')){document.getElementById('inputText').value=await file.text();parseText();return;}const data=await file.arrayBuffer();const wb=XLSX.read(data,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];const arr=XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false});rows=[];arr.forEach(line=>{const ko=val(line,0),en=val(line,1);if(ko&&en&&!isHeader(ko,en))rows.push({ko,en,done:false});});document.getElementById('inputText').value=rows.map(r=>`${r.ko}\t${r.en}`).join('\n');renderTable();});
function rateToEdge(v){const n=Number(v||1),pct=Math.round((n-1)*100);return pct===0?'+0%':pct>0?`+${pct}%`:`${pct}%`;}
function getPythonDataBlock(){return rows.map(r=>`    (${pyStr(r.ko)}, ${pyStr(r.en)})`).join(',\n');}
function setPythonCode(code,mode){currentPythonMode=mode;document.getElementById('pythonCode').textContent=code;document.getElementById('pythonCard').style.display='block';return code;}
function baseSettings(){return{base:document.getElementById('baseName').value||'opic_practice',repeat:Number(document.getElementById('repeatCount').value||1),random:document.getElementById('pythonRandom').checked,koRate:rateToEdge(document.getElementById('koRate').value),enRate:rateToEdge(document.getElementById('enRate').value),data:getPythonDataBlock()};}
function generatePython(mode='both'){if(!rows.length){alert('먼저 표를 생성해줘.');return '';}const s=baseSettings();let code='';if(mode==='both')code=["# pip install edge-tts","import asyncio","import random","from pathlib import Path","import edge_tts","",`BASE_NAME = ${pyStr(s.base)}`,`REPEAT_COUNT = ${s.repeat}`,`RANDOM_ORDER = ${s.random?'True':'False'}`,`KO_VOICE = "ko-KR-SunHiNeural"`,`EN_VOICE = "en-US-JennyNeural"`,`KO_RATE = ${pyStr(s.koRate)}`,`EN_RATE = ${pyStr(s.enRate)}`,"DATA = [",s.data,"]","out_dir = Path(BASE_NAME)","out_dir.mkdir(exist_ok=True)","async def make_mp3(text, voice, rate, path):","    communicate = edge_tts.Communicate(text, voice=voice, rate=rate)","    await communicate.save(str(path))","async def main():","    sequence = list(DATA)","    clip_no = 1","    for _ in range(REPEAT_COUNT):","        if RANDOM_ORDER:","            random.shuffle(sequence)","        for ko, en in sequence:","            no = f'{clip_no:03d}'","            await make_mp3(ko, KO_VOICE, KO_RATE, out_dir / f'{no}_ko.mp3')","            await make_mp3(en, EN_VOICE, EN_RATE, out_dir / f'{no}_en.mp3')","            print(f'saved {no}')","            clip_no += 1","    print('완료!')","if __name__ == '__main__':","    asyncio.run(main())"].join('\n');else{const isKo=mode==='ko';code=["# pip install edge-tts","import asyncio","from pathlib import Path","import edge_tts","",`BASE_NAME = ${pyStr(s.base)}`,`SELECT_TXT = ${pyStr(mode)}`,`VOICE = ${pyStr(isKo?'ko-KR-SunHiNeural':'en-US-JennyNeural')}`,`RATE = ${pyStr(isKo?s.koRate:s.enRate)}`,"DATA = [",s.data,"]","out_dir = Path(BASE_NAME)","out_dir.mkdir(exist_ok=True)","async def make_mp3(text, voice, rate, path):","    communicate = edge_tts.Communicate(text, voice=voice, rate=rate)","    await communicate.save(str(path))","    print(f'생성 완료: {path}')","async def main():",isKo?"    final_text = ' '.join([ko for ko, en in DATA])":"    final_text = ' '.join([en for ko, en in DATA])",`    await make_mp3(final_text, VOICE, RATE, out_dir / ${pyStr(isKo?'ko.mp3':'en.mp3')})`,"if __name__ == '__main__':","    asyncio.run(main())"].join('\n');}return setPythonCode(code,mode);}
function copyPython(){let code=document.getElementById('pythonCode').textContent||generatePython(currentPythonMode);if(!code)return;navigator.clipboard.writeText(code);alert('코드 복사했어.');}
function downloadPython(){let code=document.getElementById('pythonCode').textContent||generatePython(currentPythonMode);if(!code)return;const suffix=currentPythonMode==='ko'?'_ko_onefile':currentPythonMode==='en'?'_en_onefile':'_sentence_files';const blob=new Blob([code],{type:'text/x-python'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(document.getElementById('baseName').value||'opic_practice')+suffix+'.py';a.click();URL.revokeObjectURL(a.href);}
</script>
